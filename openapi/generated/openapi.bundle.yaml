components:
  securitySchemes:
    crtfcKey:
      type: apiKey
      in: query
      name: crtfc_key
      description: OpenDART에서 발급받은 40자리 API 인증키
      x-opendart-documented-type: STRING(40)
  schemas:
    OpenDartStatus:
      $ref: '#/components/schemas/OpenDartStatus__schemas'
    OpenDartXmlError:
      $ref: '#/components/schemas/OpenDartXmlError__schemas'
    DS001_2019003_Response:
      $ref: '#/components/schemas/2019003'
    DS001_2019018_Response:
      $ref: '#/components/schemas/2019018'
    DS003_2019019_Response:
      $ref: '#/components/schemas/2019019'
    OpenDartStatus__schemas:
      type: string
      enum:
        - "000"
        - "010"
        - "011"
        - "012"
        - "013"
        - "014"
        - "020"
        - "021"
        - "100"
        - "101"
        - "800"
        - "900"
        - "901"
      description: OpenDART API 수준 상태 코드입니다.
      x-opendart-code-descriptions:
        "100": 필드의 부적절한 값입니다. 필드 설명에 없는 값을 사용한 경우에 발생하는 메시지입니다.
        "101": 부적절한 접근입니다.
        "800": 시스템 점검으로 인한 서비스가 중지 중입니다.
        "900": 정의되지 않은 오류가 발생하였습니다.
        "901": 사용자 계정의 개인정보 보유기간이 만료되어 사용할 수 없는 키입니다. 관리자 이메일(opendart@fss.or.kr)로 문의하시기 바랍니다.
        "000": 정상
        "010": 등록되지 않은 키입니다.
        "011": 사용할 수 없는 키입니다. 오픈API에 등록되었으나, 일시적으로 사용 중지된 키를 통하여 검색하는 경우 발생합니다.
        "012": 접근할 수 없는 IP입니다.
        "013": 조회된 데이타가 없습니다.
        "014": 파일이 존재하지 않습니다.
        "020": |-
          요청 제한을 초과하였습니다.
          일반적으로는 20,000건 이상의 요청에 대하여 이 에러 메시지가 발생되나, 요청 제한이 다르게 설정된 경우에는 이에 준하여 발생됩니다.
        "021": 조회 가능한 회사 개수가 초과하였습니다.(최대 100건)
