name: Live Conformance

on:
  workflow_dispatch:

permissions: {}

concurrency:
  group: live-conformance
  cancel-in-progress: false

jobs:
  conformance:
    if: ${{ github.repository == 'cpaikr/opendart' && github.ref == 'refs/heads/main' }}
    environment: opendart-live-conformance
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out trusted revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Install pinned Rust toolchain
        run: rustup toolchain install 1.97.1 --profile minimal

      - name: Fetch locked Rust dependencies
        run: cargo +1.97.1 fetch --locked --manifest-path sdk/rust/Cargo.toml

      - name: Build live runners without credentials
        run: |-
          mkdir -p .live-bin
          go build -o .live-bin/opendart-tool ./cmd/opendart-tool
          live_smoke_executable="$(
            cargo +1.97.1 test --locked --offline --manifest-path sdk/rust/Cargo.toml -p opendart-cli --test live_smoke --no-run --message-format=json |
              jq -r 'select(.reason == "compiler-artifact" and .target.name == "live_smoke" and .executable != null) | .executable' |
              tail -n 1
          )"
          test -n "${live_smoke_executable}"
          test -x "${live_smoke_executable}"
          cp "${live_smoke_executable}" .live-bin/live-smoke

      - name: Recheck offline gates
        run: .live-bin/opendart-tool live-conformance --preflight-only --repository-root .

      - name: Run live conformance and Rust CLI smoke
        env:
          OPENDART_API_KEY: ${{ secrets.OPENDART_API_KEY }}
          OPENDART_LIVE_TESTS: "1"
        run: |-
          .live-bin/opendart-tool live-conformance --repository-root . > live-conformance-report.json
          .live-bin/live-smoke --exact structured_and_binary_live_paths_are_read_only_and_sanitized

      - name: Upload sanitized report
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: live-conformance-report-${{ github.run_attempt }}
          path: live-conformance-report.json
          if-no-files-found: error
          retention-days: 7
          compression-level: 0
          overwrite: false
          include-hidden-files: false
