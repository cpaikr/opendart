type: object
properties:
  status:
    $ref: ../../components/schemas.yaml#/OpenDartStatus
  message:
    description: |-
      에러 및 정보 메시지

      (※메시지 설명 참조)
    x-opendart-documented-type: not-specified
    x-opendart-korean-name: 에러 및 정보 메시지
  list:
    type: array
    items:
      type: object
      properties:
        rcept_no:
          description: |-
            접수번호

            접수번호(14자리)

            ※ 공시뷰어 연결에 이용예시
            - PC용 : https://dart.fss.or.kr/dsaf001/main.do?rcpNo=접수번호
          x-opendart-documented-type: not-specified
          x-opendart-korean-name: 접수번호
        reprt_code:
          description: |-
            보고서 코드

            1분기보고서 : 11013
            반기보고서 : 11012
            3분기보고서 : 11014
            사업보고서 : 11011
          x-opendart-documented-type: not-specified
          x-opendart-korean-name: 보고서 코드
        bsns_year:
          description: |-
            사업 연도

            2018
          x-opendart-documented-type: not-specified
          x-opendart-korean-name: 사업 연도
        corp_code:
          description: |-
            고유번호

            공시대상회사의 고유번호(8자리)
          x-opendart-documented-type: not-specified
          x-opendart-korean-name: 고유번호
        sj_div:
          description: |-
            재무제표구분

            BS : 재무상태표
            IS : 손익계산서
            CIS : 포괄손익계산서
            CF : 현금흐름표
            SCE : 자본변동표
          x-opendart-documented-type: not-specified
          x-opendart-korean-name: 재무제표구분
        sj_nm:
          description: |-
            재무제표명

            ex) 재무상태표 또는 손익계산서 출력
          x-opendart-documented-type: not-specified
          x-opendart-korean-name: 재무제표명
        account_id:
          description: |-
            계정ID

            XBRL 표준계정ID
            ※ 표준계정ID가 아닐경우 ""-표준계정코드 미사용-"" 표시
          x-opendart-documented-type: not-specified
          x-opendart-korean-name: 계정ID
        account_nm:
          description: |-
            계정명

            계정명칭
            ex) 자본총계
          x-opendart-documented-type: not-specified
          x-opendart-korean-name: 계정명
        account_detail:
          description: |-
            계정상세

            ※ 자본변동표에만 출력
            ex) 계정 상세명칭 예시
            - 자본 [member]|지배기업 소유주지분
            - 자본 [member]|지배기업 소유주지분|기타포괄손익누계액 [member]
          x-opendart-documented-type: not-specified
          x-opendart-korean-name: 계정상세
        thstrm_nm:
          description: |-
            당기명

            ex) 제 13 기
          x-opendart-documented-type: not-specified
          x-opendart-korean-name: 당기명
        thstrm_amount:
          description: |-
            당기금액

            9,999,999,999
            ※ 분/반기 보고서이면서 (포괄)손익계산서 일 경우 [3개월] 금액
          x-opendart-documented-type: not-specified
          x-opendart-korean-name: 당기금액
        thstrm_add_amount:
          description: |-
            당기누적금액

            9,999,999,999
          x-opendart-documented-type: not-specified
          x-opendart-korean-name: 당기누적금액
        frmtrm_nm:
          description: |-
            전기명

            ex) 제 12 기말
          x-opendart-documented-type: not-specified
          x-opendart-korean-name: 전기명
        frmtrm_amount:
          description: |-
            전기금액

            9,999,999,999
          x-opendart-documented-type: not-specified
          x-opendart-korean-name: 전기금액
        frmtrm_q_nm:
          description: |-
            전기명(분/반기)

            ex) 제 18 기 반기
          x-opendart-documented-type: not-specified
          x-opendart-korean-name: 전기명(분/반기)
        frmtrm_q_amount:
          description: |-
            전기금액(분/반기)

            9,999,999,999
            ※ 분/반기 보고서이면서 (포괄)손익계산서 일 경우 [3개월] 금액
          x-opendart-documented-type: not-specified
          x-opendart-korean-name: 전기금액(분/반기)
        frmtrm_add_amount:
          description: |-
            전기누적금액

            9,999,999,999
          x-opendart-documented-type: not-specified
          x-opendart-korean-name: 전기누적금액
        bfefrmtrm_nm:
          description: |-
            전전기명

            ex) 제 11 기말(※ 사업보고서의 경우에만 출력)
          x-opendart-documented-type: not-specified
          x-opendart-korean-name: 전전기명
        bfefrmtrm_amount:
          description: |-
            전전기금액

            9,999,999,999(※ 사업보고서의 경우에만 출력)
          x-opendart-documented-type: not-specified
          x-opendart-korean-name: 전전기금액
        ord:
          description: 계정과목 정렬순서
          x-opendart-documented-type: not-specified
          x-opendart-korean-name: 계정과목 정렬순서
        currency:
          description: 통화 단위
          x-opendart-documented-type: not-specified
          x-opendart-korean-name: 통화 단위
      additionalProperties: true
    description: 공식 가이드의 계층 표시를 바탕으로 배열 컨테이너로 정규화했습니다.
