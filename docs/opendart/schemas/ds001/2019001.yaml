type: object
properties:
  status:
    $ref: ../../components/schemas.yaml#/OpenDartStatus
  message:
    description: |-
      에러 및 정보 메시지

      (※메시지 설명 참조)
    x-opendart-documented-type: not-specified
    x-opendart-korean-name: 에러 및 정보 메시지
  page_no:
    description: 페이지 번호
    x-opendart-documented-type: not-specified
    x-opendart-korean-name: 페이지 번호
  page_count:
    description: 페이지 별 건수
    x-opendart-documented-type: not-specified
    x-opendart-korean-name: 페이지 별 건수
  total_count:
    description: |-
      총 건수

      총 페이지 수
    x-opendart-documented-type: not-specified
    x-opendart-korean-name: 총 건수
  total_page:
    description: 총 페이지 수
    x-opendart-documented-type: not-specified
    x-opendart-korean-name: 총 페이지 수
  list:
    type: array
    items:
      type: object
      properties:
        corp_cls:
          description: |-
            법인구분

            법인구분 : Y(유가), K(코스닥), N(코넥스), E(기타)
          x-opendart-documented-type: not-specified
          x-opendart-korean-name: 법인구분
        corp_name:
          description: |-
            종목명(법인명)

            공시대상회사의 종목명(상장사) 또는 법인명(기타법인)
          x-opendart-documented-type: not-specified
          x-opendart-korean-name: 종목명(법인명)
        corp_code:
          description: |-
            고유번호

            공시대상회사의 고유번호(8자리)
          x-opendart-documented-type: not-specified
          x-opendart-korean-name: 고유번호
        stock_code:
          description: |-
            종목코드

            상장회사의 종목코드(6자리)
          x-opendart-documented-type: not-specified
          x-opendart-korean-name: 종목코드
        report_nm:
          description: |-
            보고서명

            공시구분+보고서명+기타정보
            [기재정정] : 본 보고서명으로 이미 제출된 보고서의 기재내용이 변경되어 제출된 것임
            [첨부정정] : 본 보고서명으로 이미 제출된 보고서의 첨부내용이 변경되어 제출된 것임
            [첨부추가] : 본 보고서명으로 이미 제출된 보고서의 첨부서류가 추가되어 제출된 것임
            [변경등록] : 본 보고서명으로 이미 제출된 보고서의 유동화계획이 변경되어 제출된 것임
            [연장결정] : 본 보고서명으로 이미 제출된 보고서의 신탁계약이 연장되어 제출된 것임
            [발행조건확정] : 본 보고서명으로 이미 제출된 보고서의 유가증권 발행조건이 확정되어 제출된 것임
            [정정명령부과] : 본 보고서에 대하여 금융감독원이 정정명령을 부과한 것임
            [정정제출요구] : 본 보고서에 대하여 금융감독원이 정정제출요구을 부과한 것임
          x-opendart-documented-type: not-specified
          x-opendart-korean-name: 보고서명
        rcept_no:
          description: |-
            접수번호

            접수번호(14자리)

            ※ 공시뷰어 연결에 이용예시
            - PC용 : https://dart.fss.or.kr/dsaf001/main.do?rcpNo=접수번호
          x-opendart-documented-type: not-specified
          x-opendart-korean-name: 접수번호
        flr_nm:
          description: 공시 제출인명
          x-opendart-documented-type: not-specified
          x-opendart-korean-name: 공시 제출인명
        rcept_dt:
          description: |-
            접수일자

            공시 접수일자(YYYYMMDD)
          x-opendart-documented-type: not-specified
          x-opendart-korean-name: 접수일자
        rm:
          description: |-
            비고

            조합된 문자로 각각은 아래와 같은 의미가 있음
            유 : 본 공시사항은 한국거래소 유가증권시장본부 소관임
            코 : 본 공시사항은 한국거래소 코스닥시장본부 소관임
            채 : 본 문서는 한국거래소 채권상장법인 공시사항임
            넥 : 본 문서는 한국거래소 코넥스시장 소관임
            공 : 본 공시사항은 공정거래위원회 소관임
            연 : 본 보고서는 연결부분을 포함한 것임
            정 : 본 보고서 제출 후 정정신고가 있으니 관련 보고서를 참조하시기 바람
            철 : 본 보고서는 철회(간주)되었으니 관련 철회신고서(철회간주안내)를 참고하시기 바람
          x-opendart-documented-type: not-specified
          x-opendart-korean-name: 비고
      additionalProperties: true
    description: 공식 가이드의 계층 표시를 바탕으로 배열 컨테이너로 정규화했습니다.
    x-opendart-normalization: source-derived-unverified
