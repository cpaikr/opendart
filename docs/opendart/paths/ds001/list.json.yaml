get:
  operationId: get_list_json
  summary: 공시검색 (JSON)
  description: 공시 유형별, 회사별, 날짜별 등 여러가지 조건으로 공시보고서 검색기능을 제공합니다.
  tags:
    - DS001
  externalDocs:
    description: OpenDART 공식 개발가이드
    url: https://opendart.fss.or.kr/guide/detail.do?apiGrpCd=DS001&apiId=2019001
  security:
    - crtfcKey: []
  parameters:
    - name: corp_code
      in: query
      required: false
      description: |-
        공시대상회사의 고유번호(8자리)
        ※ 개발가이드 > 공시정보 > 고유번호 참고
      schema:
        type: string
      x-opendart-korean-name: 고유번호
      x-opendart-documented-type: STRING(8)
      x-opendart-documented-required: N
    - name: bgn_de
      in: query
      required: false
      description: |-
        검색시작 접수일자(YYYYMMDD)
        1) 기본값 : 종료일(end_de)
        2) 고유번호(corp_code)가 없는 경우 검색기간은 3개월로 제한
      schema:
        type: string
      x-opendart-korean-name: 시작일
      x-opendart-documented-type: STRING(8)
      x-opendart-documented-required: N
    - name: end_de
      in: query
      required: false
      description: |-
        검색종료 접수일자(YYYYMMDD)
        ※ 일자를 지정하지 않을 경우 당일 기준으로 조회
      schema:
        type: string
      x-opendart-korean-name: 종료일
      x-opendart-documented-type: STRING(8)
      x-opendart-documented-required: N
    - name: last_reprt_at
      in: query
      required: false
      description: |-
        최종보고서만 검색여부(Y or N)
        1) 기본값: N (N지정시 정정보고서를 포함한 제출 보고서 전체를 검색함)
      schema:
        type: string
      x-opendart-korean-name: 최종보고서 검색여부
      x-opendart-documented-type: STRING(1)
      x-opendart-documented-required: N
    - name: pblntf_ty
      in: query
      required: false
      description: |-
        A : 정기공시
        B : 주요사항보고
        C : 발행공시
        D : 지분공시
        E : 기타공시
        F : 외부감사관련
        G : 펀드공시
        H : 자산유동화
        I : 거래소공시
        J : 공정위공시
      schema:
        type: string
      x-opendart-korean-name: 공시유형
      x-opendart-documented-type: STRING(1)
      x-opendart-documented-required: N
    - name: pblntf_detail_ty
      in: query
      required: false
      description: "(※ 상세 유형 참조 : pblntf_detail_ty)"
      schema:
        type: string
      x-opendart-korean-name: 공시상세유형
      x-opendart-documented-type: STRING(4)
      x-opendart-documented-required: N
    - name: corp_cls
      in: query
      required: false
      description: |-
        법인구분 : Y(유가), K(코스닥), N(코넥스), E(기타)
        ※ 없으면 전체조회, 복수조건 불가
      schema:
        type: string
      x-opendart-korean-name: 법인구분
      x-opendart-documented-type: STRING(1)
      x-opendart-documented-required: N
    - name: sort
      in: query
      required: false
      description: |-
        접수일자: date
        회사명 : crp
        보고서명 : rpt

        ※ 기본값 : date
      schema:
        type: string
      x-opendart-korean-name: 정렬
      x-opendart-documented-type: STRING(4)
      x-opendart-documented-required: N
    - name: sort_mth
      in: query
      required: false
      description: |-
        오름차순(asc), 내림차순(desc)
        ※ 기본값 : desc
      schema:
        type: string
      x-opendart-korean-name: 정렬방법
      x-opendart-documented-type: STRING(4)
      x-opendart-documented-required: N
    - name: page_no
      in: query
      required: false
      description: "페이지 번호(1~n) 기본값 : 1"
      schema:
        type: string
      x-opendart-korean-name: 페이지 번호
      x-opendart-documented-type: STRING(5)
      x-opendart-documented-required: N
    - name: page_count
      in: query
      required: false
      description: "페이지당 건수(1~100) 기본값 : 10, 최대값 : 100"
      schema:
        type: string
      x-opendart-korean-name: 페이지 별 건수
      x-opendart-documented-type: STRING(3)
      x-opendart-documented-required: N
  responses:
    default:
      description: 공식 가이드는 API 수준 status/message를 설명하지만 HTTP 상태 코드는 별도로 규정하지 않습니다.
